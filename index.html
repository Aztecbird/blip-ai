<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blip AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="app">
        <main class="container">
            <div id="version-tag">V3.3.1</div>
            <section id="face-container">
                <div id="blip-label">B L I P</div>

                <div class="face-frame">
                    <div class="scenery-layer">
                        <div class="cloud cloud-1"></div>
                        <div class="cloud cloud-2"></div>
                        <div class="cloud cloud-3"></div>
                        <div id="bicycle-rider" class="scenery-object">🚲</div>
                        <div id="walking-cat" class="scenery-object">🐈</div>
                        <div id="traveler-person" class="scenery-object">🧳</div>
                    </div>
                    <div id="face" class="serious">
                        <div class="eyebrow-container">
                            <div class="eyebrow" id="eyebrowL"></div>
                            <div class="eyebrow" id="eyebrowR"></div>
                        </div>
                        <div class="eye-container">
                            <div class="eye" id="eyeL">
                                <div class="pupil"></div>
                            </div>
                            <div class="eye" id="eyeR">
                                <div class="pupil"></div>
                            </div>
                        </div>
                        <div id="mouth"></div>
                    </div>
                    <div id="floating-symbols"></div>
                </div>
            </section>

            <section class="controls">
                <div class="mic-meter">
                    <div id="meter-level"></div>
                </div>

                <div id="vision-preview-container" style="display: none;">
                    <div id="live-indicator" style="display: none;">LIVE 👁️</div>
                    <img id="vision-preview" src="" alt="Preview">
                    <button id="clear-image-btn" aria-label="Clear image">✕</button>
                    <button id="save-to-hub-btn" class="mini-save-btn" title="Save to Hub">📥</button>
                </div>

                <div class="button-group">
                    <button id="talkBtn" class="primary-btn">▶ START BLIP</button>
                    <div class="vision-btns">
                        <button id="hubBtn" title="Blip Hub" aria-label="Open Hub">💬</button>
                        <button id="projectorBtn" title="Projector Mode" aria-label="Toggle Projector Mode">📽️</button>
                        <button id="cameraBtn" title="Take Photo" aria-label="Open camera">📸</button>
                        <button id="watchBtn" title="Live Watch Mode" aria-label="Toggle Live Watch">👁️</button>
                        <input type="file" id="fileInput" accept="image/*,video/mp4,video/quicktime"
                            style="display: none;">
                        <button id="uploadBtn" title="Upload Image/Video" aria-label="Upload file">📁</button>
                    </div>
                </div>

                <div id="transcript-container">
                    <p id="transcript">Click Start to begin...</p>
                </div>

                <!-- Blip Hub (WhatsApp style) -->
                <div id="hub-container" class="widget-panel hub-panel">
                    <div class="panel-header">
                        <span>💬 Blip Hub</span>
                        <button id="closeHubBtn" class="panel-close-btn" aria-label="Close hub">✕</button>
                    </div>
                    <div id="hub-messages">
                        <!-- Items will be injected here -->
                        <div class="hub-empty">Hub is empty. Save photos or notes here!</div>
                    </div>
                    <div class="hub-footer">
                        <input type="text" id="hubInput" placeholder="Write a note or paste a link..."
                            aria-label="Hub note">
                        <button id="sendHubBtn" aria-label="Post to Hub">Post</button>
                    </div>
                </div>

                <div id="chart-container" class="widget-panel chart-panel">
                    <button id="closeChartBtn" class="panel-close-btn" aria-label="Close chart">✕</button>
                    <canvas id="currencyChart" style="width: 100%; height: 200px;"></canvas>
                    <button id="downloadChartBtn" class="action-link outline">⬇️ Download Graph</button>
                </div>

                <div id="map-container" class="widget-panel map-panel">
                    <button id="closeMapBtn" class="panel-close-btn" aria-label="Close map">✕</button>
                    <iframe id="map-frame" width="100%" height="250" style="border:0; display:block;" allowfullscreen=""
                        loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>

                <video id="webcam-video" autoplay playsinline style="display: none;"></video>
                <div id="camera-controls" style="display: none; gap: 10px; margin-top: 10px; justify-content: center;">
                    <button id="snapBtn" class="primary-btn" style="flex: 1;">📸 SNAP PHOTO</button>
                    <button id="stopCameraBtn" class="secondary-btn" style="padding: 10px 20px;">⏹ STOP</button>
                </div>
                <canvas id="capture-canvas" style="display: none;"></canvas>
            </section>

            <section class="settings">
                <!-- Dropdowns removed for simplification: standardizing on Gemini 2.5 Brain + Kore Voice -->
                <div id="gemini-key-container" class="setting-item">
                    <label for="geminiKeyInput">🔑 Access Key</label>
                    <input type="password" id="geminiKeyInput" placeholder="Password (1234) or AI Studio Key">
                    <small
                        style="color: var(--text-secondary); font-size: 0.65rem; margin-top: 4px; display: block; opacity: 0.7;">
                        Enter your master key or Gemini API key to unlock the brain.
                    </small>
                </div>

                <!-- Hidden inputs to keep code compatibility with minimal refactor -->
                <select id="voiceEngineSelect" style="display:none;">
                    <option value="gemini">Gemini</option>
                </select>
                <select id="geminiVoiceSelect" style="display:none;">
                    <option value="Kore">Kore</option>
                </select>
                <select id="modelSelect" style="display:none;">
                    <option value="gemini-2.5-flash">Gemini 2.5</option>
                </select>
                <select id="kokoroVoiceSelect" style="display:none;"></select>
                <span id="kokoro-status" style="display:none;"></span>
                <select id="voiceSelect" style="display:none;"></select>

            </section>
        </main>
    </div>
    <script type="module" src="src/main.js"></script>
</body>

</html>
